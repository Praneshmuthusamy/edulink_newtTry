spring.cloud.gateway.routes[8].predicates[0]=Path=/api/compliance/**,/api/audits/**
spring.cloud.gateway.routes[8].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[9].id=reporting-service
spring.cloud.gateway.routes[9].uri=lb://reporting-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/reports/**
spring.cloud.gateway.routes[9].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[10].id=notification-service
