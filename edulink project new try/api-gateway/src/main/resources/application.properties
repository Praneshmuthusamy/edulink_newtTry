spring.application.name=api-gateway
server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

jwt.secret=edulink-super-secret-key-for-jwt-signing-2024

# --- Open routes (NO JWT) — must be defined FIRST so they match before the protected catch-all ---
spring.cloud.gateway.routes[0].id=identity-service-login
spring.cloud.gateway.routes[0].uri=lb://identity-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/login

spring.cloud.gateway.routes[1].id=identity-service-register
spring.cloud.gateway.routes[1].uri=lb://identity-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/register

# --- Protected routes (JWT required) ---
spring.cloud.gateway.routes[2].id=identity-service-protected
spring.cloud.gateway.routes[2].uri=lb://identity-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[2].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[3].id=student-service
spring.cloud.gateway.routes[3].uri=lb://student-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/students/**
spring.cloud.gateway.routes[3].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[4].id=course-service
spring.cloud.gateway.routes[4].uri=lb://course-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/courses/**,/api/classes/**
spring.cloud.gateway.routes[4].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[5].id=learning-service
