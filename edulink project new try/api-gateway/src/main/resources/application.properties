spring.cloud.gateway.routes[6].id=exam-service
spring.cloud.gateway.routes[6].uri=lb://exam-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/exams/**,/api/grades/**
spring.cloud.gateway.routes[6].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[7].id=attendance-service
spring.cloud.gateway.routes[7].uri=lb://attendance-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/attendance/**,/api/performance/**
spring.cloud.gateway.routes[7].filters[0]=JwtAuthFilter

spring.cloud.gateway.routes[8].id=compliance-service
